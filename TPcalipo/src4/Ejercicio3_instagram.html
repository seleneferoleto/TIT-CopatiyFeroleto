<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 - Perfil Instagram</title>
  <link rel="stylesheet" href="Ejercicio3_instagram.css">
</head>
<body>

  <nav class="navbar">
    <span class="navbar-logo">Instagram</span>
  </nav>

  <div class="perfil-container">
    <div class="perfil-header">
      <img class="foto-perfil" src="imagenes/instagram/fotoPerfil.jpg" alt="Foto de perfil">
      <div class="perfil-info">
        <div class="perfil-usuario">
          <span class="nombre-usuario">seul_ok</span>
          <button class="btn-seguir">Seguir</button>
          <button class="btn-mensaje">Mensaje</button>
        </div>
        <div class="estadisticas">
          <div class="estadistica"><strong>3</strong> publicaciones</div>
          <div class="estadistica"><strong>1.2k</strong> seguidores</div>
          <div class="estadistica"><strong>340</strong> seguidos</div>
        </div>
        <p class="perfil-nombre">Seul Ok</p>
        <p class="perfil-bio">Fotógrafo | Buenos Aires 🇦🇷<br>Capturando momentos únicos ✨</p>
      </div>
    </div>
  </div>

  <div class="highlights">
    <div class="highlight-item">
      <img class="highlight-circulo" src="imagenes/instagram/viajes.jpg" alt="Viajes">
      <span class="highlight-label">Viajes</span>
    </div>
    <div class="highlight-item">
      <img class="highlight-circulo" src="imagenes/instagram/fotos.jpg" alt="Fotos">
      <span class="highlight-label">Fotos</span>
    </div>
    <div class="highlight-item">
      <img class="highlight-circulo" src="imagenes/instagram/amigos.jpg" alt="Amigos">
      <span class="highlight-label">Amigos</span>
    </div>
    <div class="highlight-item">
      <img class="highlight-circulo" src="imagenes/instagram/trabajo.jpg" alt="Trabajo">
      <span class="highlight-label">Trabajo</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab activo">Publicaciones</div>
    <div class="tab">Guardados</div>
    <div class="tab">Etiquetados</div>
  </div>

  <div class="grilla">
    <div class="foto-item"><img src="imagenes/instagram/publicacion.jpg" alt="Publicación 1"></div>
    <div class="foto-item"><img src="imagenes/instagram/publicacion.jpg" alt="Publicación 2"></div>
    <div class="foto-item"><img src="imagenes/instagram/publicacion.jpg" alt="Publicación 3"></div>
   </div>

</body>
</html>
