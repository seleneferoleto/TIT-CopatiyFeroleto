<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 3 - Register</title>
</head>
<body>
  <h2>Registrarse</h2>
  <form>
    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" name="nombre" placeholder="Ingresá tu nombre"><br><br>

    <label for="apellido">Apellido:</label><br>
    <input type="text" id="apellido" name="apellido" placeholder="Ingresá tu apellido"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Ingresá tu email"><br><br>

    <label for="password">Contraseña:</label><br>
    <input type="password" id="password" name="password" placeholder="Creá una contraseña"><br><br>

    <label for="password2">Repetir Contraseña:</label><br>
    <input type="password" id="password2" name="password2" placeholder="Repetí la contraseña"><br><br>

    <input type="submit" value="Registrarse">
  </form>
</body>
</html>
