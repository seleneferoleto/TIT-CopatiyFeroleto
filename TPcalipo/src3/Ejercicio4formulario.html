<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 4 - Formulario de Contacto</title>
</head>
<body>
  <h2>Formulario de Contacto</h2>
  <form>

    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" name="nombre" maxlength="30" placeholder="Ingresá tu nombre"><br><br>

    <label for="apellido">Apellido:</label><br>
    <input type="text" id="apellido" name="apellido" maxlength="30" placeholder="Ingresá tu apellido"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required placeholder="Ingresá tu email"><br><br>

    <label for="asunto">Asunto:</label><br>
    <select id="asunto" name="asunto">
      <option value="">-- Seleccioná una opción --</option>
      <option value="presupuesto">Pedir presupuesto</option>
      <option value="cita">Solicitar cita previa</option>
      <option value="otros">Otros</option>
    </select><br><br>

    <label>¿Cómo nos ha escogido?</label><br>
    <input type="checkbox" id="amigo" name="comoNos" value="amigo">
    <label for="amigo">Un amigo</label><br>
    <input type="checkbox" id="google" name="comoNos" value="google">
    <label for="google">Googleando</label><br>
    <input type="checkbox" id="redes" name="comoNos" value="redes">
    <label for="redes">Redes sociales</label><br>
    <input type="checkbox" id="otros" name="comoNos" value="otros">
    <label for="otros">Otros</label><br><br>

    <label for="mensaje">Mensaje:</label><br>
    <textarea id="mensaje" name="mensaje" maxlength="300" rows="5" cols="40" placeholder="Escribí tu mensaje (máximo 300 caracteres)"></textarea><br><br>

    <input type="checkbox" id="terminos" name="terminos" required>
    <label for="terminos">Acepto los términos y condiciones</label><br><br>

    <input type="submit" value="Enviar">
  </form>
</body>
</html>
